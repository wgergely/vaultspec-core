[pytest]
asyncio_mode = auto
markers =
    integration: requires API keys and network (deselect: -m "not integration")
    gemini: requires Gemini API key
    gemini_mcp: requires Gemini API key for MCP client tests
    claude: requires Claude/Anthropic API key
    claude_mcp: requires Anthropic API key for MCP client tests
    slow: tests requiring full 213-doc corpus (deselect: -m "not slow")
    timeout: timeout in seconds for individual tests (requires pytest-timeout)
