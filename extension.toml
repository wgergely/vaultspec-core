[extension]
description = "A governed development framework for AI agents"
name = "vaultspec"
version = "0.1.0"

[requires.python]
version = ">=3.13"

[runtime]
install = "uv sync --extra rag"
type = "python"

[entry_points]
cli = ".vaultspec/lib/scripts/cli.py"
mcp = "vaultspec.server:main"

[provides]
content_types = ["rules", "agents", "skills", "system", "templates"]
mcp = ["vaultspec-mcp"]

[outputs]
agent_dir = ".agent"
agents_md = "AGENTS.md"
claude_dir = ".claude"
gemini_dir = ".gemini"
