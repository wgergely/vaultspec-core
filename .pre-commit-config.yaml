repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check fix
        entry: ruff check --fix
        language: system
        types: [python]
        pass_filenames: true

      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types: [python]
        pass_filenames: true

      - id: ty
        name: ty
        entry: python -m ty check src/vaultspec --exclude src/vaultspec/rag
        language: system
        types: [python]
        pass_filenames: false

      - id: check-naming
        name: check docs naming
        entry: python -m vaultspec.vault_cli audit --verify
        language: system
        types: [markdown]
        pass_filenames: false

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.44.0
    hooks:
      - id: markdownlint
        name: markdownlint
        args: ["--config", ".markdownlint.yaml", "--fix", ".vaultspec/", ".vault/", "README.md"]

  - repo: https://github.com/lycheeverse/lychee.git
    rev: v0.15.1
    hooks:
      - id: lychee
        name: lychee link check
        args: ["--no-progress", "--exclude-path", "README.md"]
