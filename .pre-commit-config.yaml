repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check fix
        entry: ruff check --fix
        language: system
        types: [python]
        pass_filenames: true

      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types: [python]
        pass_filenames: true

      - id: taplo-format
        name: taplo format
        entry: npx @taplo/cli fmt
        language: system
        types: [toml]
        pass_filenames: true

      - id: taplo-lint
        name: taplo lint
        entry: npx @taplo/cli lint
        language: system
        types: [toml]
        pass_filenames: true

      - id: ty
        name: ty
        entry: uv run python -m ty check src/vaultspec
        language: system
        types: [python]
        pass_filenames: false

      - id: check-naming
        name: check docs naming
        entry: uv run python -m vaultspec.vault_cli audit --verify
        language: system
        types: [markdown]
        pass_filenames: false

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.44.0
    hooks:
      - id: markdownlint
        name: markdownlint
        args: ["--config", ".markdownlint.yaml", "--fix", ".vaultspec/", ".vault/", "README.md"]

