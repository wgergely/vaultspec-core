repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: Lint and fix Python code (Ruff)
        entry: uv run ruff check --fix
        language: system
        types: [python]
        pass_filenames: true

      - id: ruff-format
        name: Format Python code (Ruff)
        entry: uv run ruff format
        language: system
        types: [python]
        pass_filenames: true

      - id: taplo-format
        name: Format TOML files (Taplo)
        entry: taplo fmt
        language: node
        additional_dependencies: ["@taplo/cli@0.7.0"]
        types: [toml]
        pass_filenames: true

      - id: taplo-lint
        name: Lint TOML files (Taplo)
        entry: taplo lint
        language: node
        additional_dependencies: ["@taplo/cli@0.7.0"]
        types: [toml]
        pass_filenames: true

      - id: ty
        name: Type-check Python codebase (Ty)
        entry: uv run python -m ty check src/vaultspec_core
        language: system
        types: [python]
        pass_filenames: false

      - id: check-naming
        name: Verify vault document naming and integrity
        entry: uv run vaultspec-core vault check structure
        language: system
        types: [markdown]
        pass_filenames: false

      - id: markdownlint
        name: Lint Markdown style (markdownlint)
        entry: markdownlint
        language: node
        additional_dependencies: ["markdownlint-cli@0.44.0"]
        args: ["--config", ".markdownlint.json"]
        pass_filenames: true
        types: [markdown]

