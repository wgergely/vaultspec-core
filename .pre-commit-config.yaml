repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: Lint and fix Python code (Ruff)
        entry: uv run ruff check --fix
        language: system
        types: [python]
        pass_filenames: true

      - id: ruff-format
        name: Format Python code (Ruff)
        entry: uv run ruff format
        language: system
        types: [python]
        pass_filenames: true

      - id: taplo-format
        name: Format TOML files (Taplo)
        entry: npx @taplo/cli fmt
        language: system
        types: [toml]
        pass_filenames: true

      - id: taplo-lint
        name: Lint TOML files (Taplo)
        entry: npx @taplo/cli lint
        language: system
        types: [toml]
        pass_filenames: true

      - id: ty
        name: Type-check Python codebase (Ty)
        entry: uv run python -m ty check src/vaultspec_core
        language: system
        types: [python]
        pass_filenames: false

      - id: check-naming
        name: Verify vault document naming and integrity
        entry: uv run python -m vaultspec_core vault audit --verify
        language: system
        types: [markdown]
        pass_filenames: false

      - id: lychee
        name: Check documentation links (Lychee)
        entry: lychee
        language: system
        args: ["--no-progress", "--exclude-path", "README.md"]
        types: [markdown]

      - id: markdownlint
        name: Lint Markdown style (markdownlint)
        entry: npx --yes markdownlint-cli
        language: system
        args: ["--config", ".markdownlint.json", "--fix", ".vaultspec/", ".vault/", "README.md"]
        types: [markdown]

