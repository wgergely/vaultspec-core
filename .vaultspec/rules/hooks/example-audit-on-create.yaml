# Example hook: auto-verify vault after document creation.
#
# This hook runs `docs.py audit --verify` whenever a new document
# is created via `docs.py create`. Remove the `.example` suffix
# (or copy this file) to activate it.
#
# Available events:
#   vault.document.created   — after docs.py create
#   vault.document.modified  — after vault doc edits
#   vault.index.updated      — after docs.py index
#   config.synced            — after cli.py sync-all
#   audit.completed          — after docs.py audit
#
# Available action types:
#   shell  — run a shell command
#   agent  — dispatch a sub-agent via ACP
#
# Context variables (available in {placeholders}):
#   {path}     — path to the affected document
#   {root}     — workspace root directory
#   {event}    — the event name

event: vault.document.created
enabled: false  # set to true to activate
actions:
  - type: shell
    command: "python .vaultspec/lib/scripts/docs.py audit --verify"
