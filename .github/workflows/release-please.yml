name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  actions: write

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Update uv.lock on release branch
        if: steps.release.outputs.pr && !steps.release.outputs.release_created
        uses: actions/checkout@v4
        with:
          ref: ${{ fromJSON(steps.release.outputs.pr).headBranchName }}

      - name: Regenerate lockfile
        if: steps.release.outputs.pr && !steps.release.outputs.release_created
        uses: astral-sh/setup-uv@v7

      - name: Push updated lockfile
        if: steps.release.outputs.pr && !steps.release.outputs.release_created
        run: |
          uv lock
          if git diff --quiet uv.lock; then
            echo "uv.lock is already up to date"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add uv.lock
            git commit -m "chore: update uv.lock for release"
            git push
          fi

      - name: Dispatch PyPI publish workflow
        if: steps.release.outputs.release_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          if [ -z "${TAG}" ]; then
            echo "::error::release-please reported release_created=true but tag_name output is empty"
            exit 1
          fi
          echo "Dispatching publish.yml for tag: ${TAG}"
          gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/publish.yml/dispatches" \
            -f "ref=${TAG}" \
            -f "inputs[tag]=${TAG}"
          echo "Dispatched publish.yml for ${TAG}" >> "$GITHUB_STEP_SUMMARY"
