# NOTE: This workflow requires GitHub Advanced Security (GHAS) on private repos.
# GHAS is free on public repos. If this job fails with a permissions error on a
# private repo, either enable GHAS in repo settings or remove this workflow.
name: Dependency Review

on:
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
