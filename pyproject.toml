[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "task-driven-development"
version = "0.1.0"
description = "Research, Design, Task Driven Development Framework"
readme = "README.md"
requires-python = ">=3.10"
license = {file = "LICENSE"}
authors = [
    {name = "Gergely Wootsch", email = "hello@gergely-wootsch.com"}
]
dependencies = [
    "a2a-sdk>=0.3.22",
    "agent-client-protocol>=0.1.0",
    "httpx>=0.27.0",
    "pydantic>=2.0.0",
    "uvicorn>=0.23.0",
    "starlette>=0.27.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "ruff>=0.1.0",
    "mypy>=1.0.0",
]

[tool.ruff]
line-length = 88
target-version = "py310"

[tool.mypy]
python_version = "3.10"
strict = true
ignore_missing_imports = true
