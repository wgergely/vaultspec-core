[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "task-driven-development"
version = "0.1.0"
description = "Research, Design, Task Driven Development Framework"
readme = "README.md"
requires-python = ">=3.13"
license = {file = "LICENSE"}
authors = [
    {name = "Gergely Wootsch", email = "hello@gergely-wootsch.com"}
]
dependencies = [
    "a2a-sdk>=0.3.22",
    "agent-client-protocol>=0.1.0",
    "httpx>=0.27.0",
    "pydantic>=2.0.0",
    "uvicorn>=0.23.0",
    "starlette>=0.27.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "ruff>=0.1.0",
    "ty>=0.1.0",
    "prek>=0.3.0",
]

[tool.ruff]
line-length = 88
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.ruff.lint.isort]
known-first-party = ["orchestration", "protocol", "acp", "mcp_dispatch", "acp_dispatch"]

[tool.ty.environment]
python-version = "3.13"
root = [".", ".rules/lib/src"]
